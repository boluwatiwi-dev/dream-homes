{% extends "myapp/base.html" %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">✏️ Edit Property</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success">
            Save Changes
        </button>

        <a href="{% url 'dashboard' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
