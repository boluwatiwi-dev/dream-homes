<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Property Owner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">
                    <h3>📩 Contact Property Owner</h3>
                </div>

                <div class="card-body">

                    <h4 class="mb-3">
                        {{ property.title }}
                    </h4>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label>Your Name</label>
                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Email Address</label>
                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Phone Number</label>
                            <input
                                type="text"
                                name="phone"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label>Message</label>

                            <textarea
                                name="message"
                                rows="5"
                                class="form-control"
                                placeholder="I'm interested in this property..."
                                required></textarea>
                        </div>

                        <button class="btn btn-warning w-100">
                            Send Inquiry
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
